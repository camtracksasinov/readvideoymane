mit 100
notifications.getdata=select * from sp_mailnotifications();
weeklyrest.getdata=select DISTINCT u.userid, u.emailid, totalduration, to_char( startdatetime, 'dd Mon yyyy HH24:MI:SS' ) as startdate, to_char( enddatetime, 'dd Mon yyyy HH24:MI:SS' ) as enddate, v.vehicleid, d.driverid, wr.exceptionid, v.vehicledesc as vehcile, t."name" as transportername, d."name" as driver, el."name" as exceptionlevel, ln."name" as languagename, wr.threshold , startdatetime FROM "users" u JOIN customeraffiliate ca ON ca.customerid = u.customerid JOIN transporter t ON t.affiliateid = ca.affiliateid join vehicle v on v.transporterid = t.transporterid join weeklyrest wr on wr.vehicleid = v.vehicleid JOIN emailconfig ec ON ec.mailflag = 1 AND ec.levelid = CAST (wr."level" AS INTEGER) AND ec.paramtypeid = CAST (wr.exceptiontype AS INTEGER) join driver d on d.driverid = wr.driverid LEFT JOIN emailnotification en ON en.exceptionid = wr.exceptionid and en.userid=u.userid left join exceptionlevel el on el.exceptionlevelid = CAST (wr."level" AS INTEGER) LEFT JOIN customer cus ON cus.customerid = u.customerid LEFT JOIN LANGUAGE ln ON ln.languageid = cus.languageid WHERE 1 = 1 AND u.emailid IS NOT NULL AND u.emailid != '' AND u.emailflag = 1 AND en.exceptionid IS null and wr.totalduration > wr.threshold order by startdatetime desc limit 10
