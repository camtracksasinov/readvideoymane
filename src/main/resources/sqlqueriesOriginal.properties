allvehicleanddriver.driver = select 1 as nveh,1 as ndrv,driverid as ids from driver where status = 1 and driverid in (IDRIVERID)
allvehicleanddriver.vehicle = select 1 as nveh,1 as ndrv,vehicleid as ids from vehicle where status = 1 and vehicleid in (IDVEHICLEID)
allvehicleanddriver.transporter = select t0.counts as nveh,t1.counts2 as ndrv,coalesce(t0.ids, t1.ids) as ids from (select count(distinct vehicleid) as counts2,transporterid as ids from vehicle where status = 1 and transporterid in (TRANSIPPORTER) group by transporterid) as t1 full join (select count(distinct driver) as counts,transporterid as ids from driver where status = 1 and transporterid in (TRANSIPPORTER) group by transporterid) as t0 on t0.ids = t1.ids
allvehicleanddriver.affiliate = select t0.counts as nveh,t1.counts2 as ndrv,t0.ids from (select count(distinct dr.driverid) as counts, AFFIDLIATE as ids from driver dr where dr.status = 1 and dr.transporterid in (select trans.transporterid from transporter trans where trans.affiliateid = AFFIDLIATE)) as t0 ,(select count(distinct dr.vehicleid) as counts2, AFFIDLIATE as ids from vehicle dr where dr.status = 1 and dr.transporterid in (select trans.transporterid from transporter trans where trans.affiliateid = AFFIDLIATE)) as t1 where t0.ids = t1.ids
allvehicleanddriver.client = select t0.counts as nveh,t1.counts2 as ndrv,t0.ids from (select count(distinct dr.driverid) as counts,CUSIDMER as ids from driver dr where dr.status = 1 and dr.transporterid in (select trans.transporterid from transporter trans where trans.affiliateid in (select cus.affiliateid from customeraffiliate cus where cus.customerid = CUSIDMER))) as t0 ,(select count(distinct dr.vehicleid) as counts, CUSIDMER as ids from vehicle dr where dr.status = 1 and dr.transporterid in (select trans.transporterid from transporter trans where trans.affiliateid in (select cus.affiliateid from customeraffiliate cus where cus.customerid = CUSIDMER))) as t1 where t0.ids = t1.ids

