manualsublist.alldriver = select m.dateofocurrence,m.transportericp,sum(mr.points) as recoverypoints from manualaccicp m join manualrecovery mr on mr.clientid = m.clientid and mr.affiliateid = m.affiliateid and	mr.transporterid = m.transporterid and	mr.driverid = 0 and	date(mr.dateofocurrence) = date(m.dateofocurrence) where m.clientid=? and m.affiliateid=? and m.transporterid =? and m.driverid =? and date(m.dateofocurrence) between ? and ? and m.status = 1 and mr.status = 1 group by m.dateofocurrence,m.transportericp
manualreclist.alldriver = select m.dateofocurrence,m.transportericp,d."name",d.driverkeycode,d.driverid as driverid,m.noofaccident as accidents,(select sum(mr.points) as recoverypoints from manualrecovery mr where mr.driverid = d.driverid and date(mr.dateofocurrence) = m.dateofocurrence) as recoverypoints,(select sum(ms.points) as subtractedpoints from manualsubstraction ms where ms.driverid = d.driverid and date(ms.dateofocurrence) = m.dateofocurrence) as subtractedpoints from  manualaccicp m join driver d on m.driverid = d.driverid join manualrecovery mr on mr.clientid = m.clientid and mr.affiliateid = m.affiliateid and mr.transporterid = m.transporterid and mr.driverid = d.driverid and date(mr.dateofocurrence) = date(m.dateofocurrence) join manualsubstraction ms on ms.clientid = m.clientid and ms.affiliateid = m.affiliateid and ms.transporterid = m.transporterid and ms.driverid = d.driverid and date(ms.dateofocurrence) = date(m.dateofocurrence) where  m.clientid=? and m.affiliateid=? and m.transporterid =? and date(m.dateofocurrence) between ? and ? and  m.status = 1 and mr.status = 1 and ms.status = 1 group by m.dateofocurrence,d.name,d.driverkeycode,m.transportericp,m.noofaccident,d.driverid

manualsublist.alldriverclient = select m.dateofocurrence,m.transportericp,sum(mr.points) as recoverypoints from manualaccicp m join manualrecovery mr on mr.clientid = m.clientid and mr.affiliateid = m.affiliateid and mr.transporterid = m.transporterid and	mr.driverid = 0 and	date(mr.dateofocurrence) = date(m.dateofocurrence) where m.clientid in (CLIENSTS) and m.dateofocurrence <= DATES1 and m.dateofocurrence > DATES2 and m.status = 1 and mr.status = 1 group by m.dateofocurrence,m.transportericp
manualreclist.alldriverclient = select m.dateofocurrence,m.transportericp,d."name",d.driverkeycode,d.driverid as driverid,m.noofaccident as accidents,(select sum(mr.points) as recoverypoints from manualrecovery mr where mr.driverid = d.driverid and date(mr.dateofocurrence) = m.dateofocurrence) as recoverypoints,(select sum(ms.points) as subtractedpoints from manualsubstraction ms where ms.driverid = d.driverid and date(ms.dateofocurrence) = m.dateofocurrence) as subtractedpoints from  manualaccicp m join driver d on m.driverid = d.driverid join manualrecovery mr on mr.clientid = m.clientid and mr.affiliateid = m.affiliateid and mr.transporterid = m.transporterid and mr.driverid = d.driverid and date(mr.dateofocurrence) = date(m.dateofocurrence) join manualsubstraction ms on ms.clientid = m.clientid and ms.affiliateid = m.affiliateid and ms.transporterid = m.transporterid and ms.driverid = d.driverid and date(ms.dateofocurrence) = date(m.dateofocurrence) where  m.clientid in (:clients) and date(m.dateofocurrence) between :date1 and :date2 and  m.status = 1 and mr.status = 1 and ms.status = 1 group by m.dateofocurrence,d.name,d.driverkeycode,m.transportericp,m.noofaccident,d.driverid

