sumalldecarbonisationperiodfordrivergroupby = select drivsum.driverid as ids,sum(2.254*(drivsum.fuels)/greatest(drivsum.totaldistance,1)) as carbonperkm,sum(2.254*(drivsum.fuels)) as carbon from vehicletrips drivsum where drivsum.startdatetime >= 'DATTTES1' and drivsum.startdatetime< 'DATTTES2' and drivsum.driverid in (SQLINS) group by drivsum.driverid
sumalldecarbonisationperiodforvehiclegroupby = select drivsum.vehicleid as ids,sum(2.254*(drivsum.fuels)/greatest(drivsum.totaldistance,1)) as carbonperkm,sum(2.254*(drivsum.fuels)) as carbon from vehicletrips drivsum where drivsum.startdatetime >= 'DATTTES1' and drivsum.startdatetime< 'DATTTES2' and drivsum.vehicleid in (SQLINS) group by drivsum.vehicleid
sumalldecarbonisationperiodfortransportergroupby = select drivsum.transporterid as ids,sum(2.254*(drivsum.fuels)/greatest(drivsum.totaldistance,1)) as carbonperkm,sum(2.254*(drivsum.fuels)) as carbon from vehicletrips drivsum where drivsum.startdatetime >= 'DATTTES1' and drivsum.startdatetime< 'DATTTES2' and drivsum.transporterid in (SQLINS) group by drivsum.transporterid
sumalldecarbonisationperiodforaffiliategroupby = select drivsum.affiliateid as ids,sum(2.254*(drivsum.fuels)/greatest(drivsum.totaldistance,1)) as carbonperkm,sum(2.254*(drivsum.fuels)) as carbon from vehicletrips drivsum where drivsum.startdatetime >= 'DATTTES1' and drivsum.startdatetime< 'DATTTES2' and drivsum.affiliateid in (SQLINS) group by drivsum.affiliateid
sumalldecarbonisationperiodforclientgroupby = select drivsum.clientid as ids,sum(2.254*(drivsum.fuels)/greatest(drivsum.totaldistance,1)) as carbonperkm,sum(2.254*(drivsum.fuels)) as carbon from vehicletrips drivsum where drivsum.startdatetime >= 'DATTTES1' and drivsum.startdatetime< 'DATTTES2' and drivsum.clientid in (SQLINS) group by drivsum.clientid

selectdecarbonisationdetailexception = select bigexception.clientid as clid,bigexception.affiliateid as affid, bigexception.transporterid as trpid, bigexception.vehicleid as vehid, bigexception.driverid as drvid, bigexception.startdatetime as dat, bigexception.enddatetime as endat, bigexception.totaldistance as dist,bigexception.fuels as fuel, 2.254*(bigexception.fuels)/greatest(bigexception.totaldistance,1) as carboperkm,2.254*(bigexception.fuels) as carbo from vehicletrips bigexception where XXXXXXXXXX



#Daily
