rawstatistic = select Z.affiliateid,  Z.transporterid, Z.driverid, Z.exceptiontype,Z.level1_cnt,Z.level2_cnt,Z.level3_cnt,Z.recordscore,Z.alertscore,Z.alarmscore,Z.obcparamid, Z.obclabel from (select T.affiliateid,  T.transporterid, T.driverid, T.exceptiontype, sum( CASE T.level WHEN 1 THEN 1  ELSE 0 END) AS level1_cnt,  sum( CASE T.level WHEN 2 THEN 1 ELSE 0   END) AS level2_cnt,  sum( CASE T.level WHEN 3 THEN 1 ELSE 0  END) AS level3_cnt,  sum( CASE T.level WHEN 1 THEN 1  ELSE 0 END) * T.recordvalue AS recordscore, sum( CASE T.level  WHEN 2 THEN 1 ELSE 0  END) * T.alertvalue AS alertscore, sum(  CASE T.level  WHEN 3 THEN 1 ELSE 0 END) * T.alarmvalue AS alarmscore, T.obcparamid, T.obclabel from  (SELECT   scobc.recordvalue, scobc.alertvalue, scobc.alarmvalue, obc.obclabel, e.affiliateid, e.transporterid, e.driverid, e.exceptiontype,  e.level, obc.obcparamid,  date_part('month'::text, date(e.startdatetime::timestamp without time zone)) AS dmonth, date_part('year'::text, date(e.startdatetime::timestamp without time zone)) AS dyear FROM exception e,  scpobcparameter scobc, obcparameter obc WHERE e.exceptiontype = scobc.obcparamid AND e.affiliateid = scobc.affiliateid AND scobc.obcparamid = obc.obcparamid   XXXXXXXXXXXXXXXXXXXX)T where T.dmonth = MONTHTDID AND T.dyear = YEARTDID GROUP BY T.affiliateid, T.transporterid, T.driverid, T.exceptiontype, T.recordvalue, T.alertvalue, T.alarmvalue, T.obcparamid, T.obclabel)Z where ((Z.alertscore > 0) or (Z.alarmscore>0) or (Z.recordscore>0))
rawstatistic2 = select Z.affiliateid,  Z.transporterid, Z.driverid, Z.exceptiontype,Z.level1_cnt,Z.level2_cnt,Z.level3_cnt,Z.recordscore,Z.alertscore,Z.alarmscore,Z.obcparamid, Z.obclabel from (select T.affiliateid,  T.transporterid, T.driverid, T.exceptiontype, sum( CASE T.level WHEN 1 THEN 1  ELSE 0 END) AS level1_cnt,  sum( CASE T.level WHEN 2 THEN 1 ELSE 0   END) AS level2_cnt,  sum( CASE T.level WHEN 3 THEN 1 ELSE 0  END) AS level3_cnt,  sum( CASE T.level WHEN 1 THEN 1  ELSE 0 END) * T.recordvalue AS recordscore, sum( CASE T.level  WHEN 2 THEN 1 ELSE 0  END) * T.alertvalue AS alertscore, sum(  CASE T.level  WHEN 3 THEN 1 ELSE 0 END) * T.alarmvalue AS alarmscore, T.obcparamid, T.obclabel from  (SELECT   scobc.recordvalue, scobc.alertvalue, scobc.alarmvalue, obc.obclabel, e.affiliateid, e.transporterid, e.driverid, e.exceptiontype,  e.level, obc.obcparamid,  date_part('month'::text, date(e.startdatetime::timestamp without time zone)) AS dmonth, date_part('year'::text, date(e.startdatetime::timestamp without time zone)) AS dyear FROM exception e,  scpobcparameter scobc, obcparameter obc WHERE e.exceptiontype = scobc.obcparamid AND e.affiliateid = scobc.affiliateid AND scobc.obcparamid = obc.obcparamid   XXXXXXXXXXXXXXXXXXXX)T where (T.dmonth <= MONTHTDID AND T.dmonth >=MO0NTHTDID0) AND (T.dyear <= YEARTDID AND T.dyear >= YE0ARTDID0) GROUP BY T.affiliateid, T.transporterid, T.driverid, T.exceptiontype, T.recordvalue, T.alertvalue, T.alarmvalue, T.obcparamid, T.obclabel)Z where ((Z.alertscore > 0) or (Z.alarmscore>0) or (Z.recordscore>0))

rawstatisticin = select Z.affiliateid,  Z.transporterid, Z.driverid, Z.exceptiontype,Z.level1_cnt,Z.level2_cnt,Z.level3_cnt,Z.recordscore,Z.alertscore,Z.alarmscore,Z.obcparamid, Z.obclabel from (select T.affiliateid,  T.transporterid, T.driverid, T.exceptiontype, sum( CASE T.level WHEN 1 THEN 1  ELSE 0 END) AS level1_cnt,  sum( CASE T.level WHEN 2 THEN 1 ELSE 0   END) AS level2_cnt,  sum( CASE T.level WHEN 3 THEN 1 ELSE 0  END) AS level3_cnt,  sum( CASE T.level WHEN 1 THEN 1  ELSE 0 END) * T.recordvalue AS recordscore, sum( CASE T.level  WHEN 2 THEN 1 ELSE 0  END) * T.alertvalue AS alertscore, sum(  CASE T.level  WHEN 3 THEN 1 ELSE 0 END) * T.alarmvalue AS alarmscore, T.obcparamid, T.obclabel from  (SELECT   scobc.recordvalue, scobc.alertvalue, scobc.alarmvalue, obc.obclabel, e.affiliateid, e.transporterid, e.driverid, e.exceptiontype,  e.level, obc.obcparamid,  date_part('month'::text, date(e.startdatetime::timestamp without time zone)) AS dmonth, date_part('year'::text, date(e.startdatetime::timestamp without time zone)) AS dyear FROM exception e,  scpobcparameter scobc, obcparameter obc WHERE e.exceptiontype = scobc.obcparamid AND e.affiliateid = scobc.affiliateid AND scobc.obcparamid = obc.obcparamid   XXXXXXXXXXXXXXXXXXXX)T where YYYYYYYYYY T.dyear = YEARTDID GROUP BY T.affiliateid, T.transporterid, T.driverid, T.exceptiontype, T.recordvalue, T.alertvalue, T.alarmvalue, T.obcparamid, T.obclabel)Z where ((Z.alertscore > 0) or (Z.alarmscore>0) or (Z.recordscore>0))

