activevehicle.transporter = select T.transporterid as entitiesid,sum(T.count) as sum from (select count(distinct  bigexception.vehicleid) as count,bigexception.transporterid,bigexception.vehicleid from vehicleactivitysummary bigexception where XXXXXXXXXX group by bigexception.transporterid,bigexception.vehicleid)T group by T.transporterid
